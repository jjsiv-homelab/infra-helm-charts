{{- $top := . }}
{{- range $i, $spec := .Values.dashboards }}
{{- $folderName := regexReplaceAll "[^a-z0-9-]+" (lower $spec.folder) "-" | trimAll "-" }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: {{ $folderName }}
  namespace: {{ $top.Release.Namespace }}
spec:
  instanceSelector:
    matchLabels:
      instance: "{{ $top.Release.Name }}"
  title: {{ $spec.folder }}
---
{{- range $j, $dashboard := $spec.imports }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: {{ $dashboard.name }}
  namespace: {{ $top.Release.Namespace }}
spec:
  folderRef: {{ $folderName }}
  instanceSelector:
    matchLabels:
      instance: "{{ $top.Release.Name }}"
  grafanaCom:
    id: {{ $dashboard.id }}
---
{{- end }}
{{- end }}
